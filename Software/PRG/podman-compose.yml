version: '3.8'

# ============================================================================
# Benning Device Manager - Podman Compose / Docker Compose
# Parametrisierte DGUV3-Datenbank für CachyOS / Arch / Podman
# ============================================================================
#
# NOTE: Für ein neues MySQL-Root-Passwort muss ein neues/leeres Volume verwendet
# werden, z. B. per .env:
#
#   MYSQL_VOLUME_NAME=prg_mysql_data_tss_bierwagen
#   DB_ROOT_PASSWORD=NeuesRootPasswort
#   DB_NAME=db_tss_bierwagen
#   DB_USER=tss_user
#   DB_PASSWORD=NeuesUserPasswort
#
# Ein bereits initialisiertes MySQL-Volume übernimmt spätere Änderungen an
# DB_ROOT_PASSWORD nicht automatisch.
# ============================================================================

services:
  # ANCHOR: MySQL Database
  mysql:
    image: docker.io/library/mysql:8.0
    container_name: benning-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-db_dguv3}
      MYSQL_USER: ${DB_USER:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin}
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d:ro
    networks:
      - benning-network

  # ANCHOR: Flask Application
  flask:
    build:
      context: .
      dockerfile: Dockerfile.benning
    image: localhost/prg_flask:latest
    container_name: benning-flask
    restart: unless-stopped
    # NOTE: Podman Compose behandelt Healthcheck-Bedingungen je nach Version
    # uneinheitlich. Das Startskript wartet bereits aktiv auf MySQL; deshalb
    # reicht hier eine einfache Startabhängigkeit.
    depends_on:
      - mysql
    environment:
      FLASK_APP: src.main
      FLASK_ENV: ${FLASK_ENV:-production}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-dguv3}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_dguv3}
      DB_NAME: ${DB_NAME:-dguv3_db}
      DEFAULT_CUSTOMER: ${DEFAULT_CUSTOMER:-TSS}
      PYTHONUNBUFFERED: "1"
      PYTHONOPTIMIZE: "2"
    ports:
      - "${FLASK_PORT:-5000}:5000"
    volumes:
      - ./:/app:ro
      - ./static:/app/static
      - ./templates:/app/templates
    networks:
      - benning-network

  # ANCHOR: Nginx Reverse Proxy Optional
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: benning-nginx
    restart: unless-stopped
    depends_on:
      - flask
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - benning-network
    profiles:
      - production

# ANCHOR: Volumes
volumes:
  mysql_data:
    name: ${MYSQL_VOLUME_NAME:-prg_mysql_data}
    driver: local

# ANCHOR: Networks
networks:
  benning-network:
    driver: bridge
